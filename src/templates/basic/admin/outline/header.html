<div class="admin-outline-tools">
  <button class="admin-outline-notice-button" type="button" aria-label="알림">
    <span class="admin-outline-notice-dot"></span>
    <svg class="admin-outline-notice-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
    </svg>
  </button>
  <div class="admin-outline-profile">
    <button id="profileBtn" class="admin-outline-profile-button" type="button">
      <div class="admin-outline-profile-avatar">AD</div>
      <span class="admin-outline-profile-name">관리자</span>
      <svg class="admin-outline-profile-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
      </svg>
    </button>
    <div id="profileMenu" class="admin-outline-profile-menu">
      <a href="#" class="admin-outline-profile-menu-link">내 프로필</a>
      <a href="/{{ setting.site.admin_directory }}/member/my-profile" class="admin-outline-profile-menu-link">내 정보 수정</a>
      <div class="admin-outline-profile-menu-divider"></div>
      <form method="post" action="/{{ setting.site.admin_directory }}/logout" class="admin-outline-profile-menu-logout-form">
        <input type="hidden" name="{{ csrf.keys.name }}" value="{{ csrf.name }}">
        <input type="hidden" name="{{ csrf.keys.value }}" value="{{ csrf.value }}">
        <button type="submit" class="admin-outline-profile-menu-link is-danger">로그아웃</button>
      </form>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const profileBtn = document.getElementById('profileBtn');
    const profileMenu = document.getElementById('profileMenu');

    if (!profileBtn || !profileMenu) {
      return;
    }

    profileBtn.addEventListener('click', (event) => {
      event.stopPropagation();
      profileMenu.classList.toggle('is-open');
    });

    document.addEventListener('click', () => {
      profileMenu.classList.remove('is-open');
    });
  });
</script>
