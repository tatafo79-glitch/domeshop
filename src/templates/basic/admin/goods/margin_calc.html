<!DOCTYPE html>
<html lang="ko" class="admin-frame-html">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마진 계산기</title>
  <link href="/dist/{{ setting.skin.name }}/css/admin.css?v=74" rel="stylesheet">
  <script type="module" src="/dist/{{ setting.skin.name }}/js/admin/goods/margin_calc.js?v=20"></script>
</head>
<body class="admin-frame-body" data-default-market-fee="0" data-default-shipping-fee="0" data-default-platform-code="{{ default_platform_code }}">
  <main class="admin-goods-margin-calc-frame" id="mcContentWrapper" data-margin-calc>
    <div class="admin-goods-margin-calc-head">
      <p class="admin-page-desc">판매가격, 공급가, 수수료 등을 입력하여 마진율과 판매이익을 계산합니다.</p>
    </div>

    <section class="admin-goods-margin-calc-summary" aria-live="polite">
      <div class="admin-goods-margin-calc-summary-item">
        <span>정산금액</span>
        <strong><span id="mcSettlement">0</span> 원</strong>
        <span class="admin-goods-margin-calc-result-line">판매이익 <strong><span id="mcResultProfit">0</span> 원</strong></span>
        <span class="admin-goods-margin-calc-result-line">마진율 <strong><span id="mcResultMarginRate">0.0</span>%</strong></span>
      </div>
      <label class="admin-goods-margin-calc-summary-item" for="mcProfit">
        <span>목표 판매이익 입력</span>
        <span class="admin-goods-margin-calc-summary-input">
          <input id="mcProfit" type="text" inputmode="numeric" class="admin-input" value="0" data-margin-input="target-profit">
          <em>원</em>
        </span>
      </label>
      <label class="admin-goods-margin-calc-summary-item" for="mcMarginRate">
        <span>목표 마진율 입력</span>
        <span class="admin-goods-margin-calc-summary-input is-percent">
          <input id="mcMarginRate" type="text" inputmode="decimal" class="admin-input" value="0.0" data-margin-input="target-rate">
          <em>%</em>
        </span>
      </label>
    </section>

    <div class="admin-goods-margin-calc-grid">
      <section class="admin-card admin-goods-margin-calc-card is-site">
        <div class="admin-card-header">
          <h2 class="admin-card-title">사이트</h2>
        </div>
        <div class="admin-goods-margin-calc-fields">
          <label class="admin-goods-margin-calc-row" for="mcSellPrice">
            <span>판매가격</span>
            <span class="admin-goods-margin-calc-unit-input">
              <input id="mcSellPrice" type="text" inputmode="numeric" class="admin-input" placeholder="0" value="{{ calculator.sell_price|number_format }}" data-margin-input="sell">
              <em>원</em>
            </span>
          </label>
          <label class="admin-goods-margin-calc-row" for="mcRecvShipping">
            <span>배송비</span>
            <span class="admin-goods-margin-calc-unit-input">
              <input id="mcRecvShipping" type="text" inputmode="numeric" class="admin-input" placeholder="0" value="{{ calculator.shipping_fee|number_format }}" data-margin-input="recv-shipping">
              <em>원</em>
            </span>
          </label>
          <label class="admin-goods-margin-calc-row" for="mcSupplyPrice">
            <span class="is-danger">매입가(공급가)</span>
            <span class="admin-goods-margin-calc-unit-input">
              <input id="mcSupplyPrice" type="text" inputmode="numeric" class="admin-input" placeholder="0" value="{{ calculator.supply_price|number_format }}" data-margin-input="supply">
              <em>원</em>
            </span>
          </label>
          <div class="admin-goods-margin-calc-row is-shipping-diff">
            <span>실제 배송비</span>
            <span class="admin-goods-margin-calc-unit-input">
              <label class="admin-goods-margin-calc-check" for="mcShippingDiffMargin">
                <input id="mcShippingDiffMargin" type="checkbox" data-margin-input="shipping-diff-margin">
                <span>차액 포함</span>
              </label>
              <input id="mcSentShipping" type="text" inputmode="numeric" class="admin-input" placeholder="0" value="{{ calculator.actual_shipping_fee|number_format }}" data-margin-input="sent-shipping">
              <em>원</em>
            </span>
          </div>
          <label class="admin-goods-margin-calc-row" for="mcPackageQtyLimit">
            <span>합포장 기준 수량</span>
            <span class="admin-goods-margin-calc-unit-input">
              <input id="mcPackageQtyLimit" type="text" inputmode="numeric" class="admin-input" placeholder="1" value="{{ calculator.shipping_qty_limit|default(1)|number_format }}" data-margin-input="package-qty-limit">
              <em>개</em>
            </span>
          </label>
          <label class="admin-goods-margin-calc-row" for="mcPurchaseQty">
            <span>구매수량</span>
            <span class="admin-goods-margin-calc-unit-input">
              <input id="mcPurchaseQty" type="text" inputmode="numeric" class="admin-input" placeholder="1" value="{{ calculator.purchase_qty|default(1)|number_format }}" data-margin-input="purchase-qty">
              <em>개</em>
            </span>
          </label>
        </div>
      </section>

      <section class="admin-card admin-goods-margin-calc-card">
        <div class="admin-card-header">
          <h2 class="admin-card-title">플랫폼</h2>
          <select id="mcPlatformSelect" class="admin-input admin-goods-margin-calc-platform" aria-label="플랫폼 선택">
            <option value="" data-market="0" data-shipping="0" data-instant="0" data-add="0" data-flat="0">플랫폼 선택</option>
            {% for platform in platform_fees %}
              <option value="{{ platform.platform_code }}" data-market="{{ platform.platform_fee_rate }}" data-shipping="{{ platform.shipping_fee_rate }}" data-instant="{{ platform.instant_discount_rate }}" data-add="{{ platform.additional_discount_rate }}" data-flat="{{ platform.additional_fixed_discount }}"{% if platform.platform_code == default_platform_code %} selected{% endif %}>{{ platform.platform_name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="admin-goods-margin-calc-fields">
          <label class="admin-goods-margin-calc-row" for="mcMarketFee">
            <span>플랫폼 수수료</span>
            <span class="admin-goods-margin-calc-unit-input">
              <input id="mcMarketFee" type="text" inputmode="decimal" class="admin-input" placeholder="0" value="0" data-margin-input="market-fee">
              <em>%</em>
            </span>
          </label>
          <label class="admin-goods-margin-calc-row" for="mcShippingFee">
            <span>배송비 수수료</span>
            <span class="admin-goods-margin-calc-unit-input">
              <input id="mcShippingFee" type="text" inputmode="decimal" class="admin-input" placeholder="0" value="0" data-margin-input="shipping-fee-rate">
              <em>%</em>
            </span>
          </label>
          <label class="admin-goods-margin-calc-row" for="mcDisplayPriceInput">
            <span>노출가격</span>
            <span class="admin-goods-margin-calc-unit-input">
              <input id="mcDisplayPriceInput" type="text" inputmode="numeric" class="admin-input" placeholder="0" value="0" data-margin-input="display-price">
              <em>원</em>
            </span>
          </label>
          <label class="admin-goods-margin-calc-row" for="mcInstantDiscountRate">
            <span>즉시 할인</span>
            <span class="admin-goods-margin-calc-unit-input">
              <input id="mcInstantDiscountRate" type="text" inputmode="decimal" class="admin-input" placeholder="0" value="0" data-margin-input="instant-discount">
              <em>%</em>
            </span>
          </label>
          <label class="admin-goods-margin-calc-row" for="mcAddDiscountRate">
            <span>부가 할인</span>
            <span class="admin-goods-margin-calc-unit-input">
              <input id="mcAddDiscountRate" type="text" inputmode="decimal" class="admin-input" placeholder="0" value="" data-margin-input="add-discount">
              <em>%</em>
            </span>
          </label>
          <label class="admin-goods-margin-calc-row" for="mcAddFlatDiscount">
            <span>부가 정액 할인</span>
            <span class="admin-goods-margin-calc-unit-input">
              <input id="mcAddFlatDiscount" type="text" inputmode="numeric" class="admin-input" placeholder="0" value="" data-margin-input="flat-discount">
              <em>원</em>
            </span>
          </label>
        </div>
      </section>
    </div>

    <div class="admin-goods-margin-calc-actions">
      <button type="button" class="admin-btn-secondary" id="mcResetBtn">초기화</button>
      {% if calculator.can_apply %}<button type="button" class="admin-btn-primary" id="mcApplyBtn">폼에 적용하기</button>{% endif %}
    </div>

    <section class="admin-goods-margin-calc-formula" aria-labelledby="mcFormulaTitle">
      <h2 id="mcFormulaTitle">계산식</h2>
      <ul id="mcFormulaList" class="admin-goods-margin-calc-formula-list"></ul>
    </section>
  </main>
</body>
</html>
